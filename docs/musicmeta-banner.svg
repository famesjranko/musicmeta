<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" fill="none">
  <defs>
    <!-- Diagonal gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Glow behind text -->
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="10%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="90%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="#0a0e1a"/>


  <!-- Main title with glow -->
  <text x="450" y="150" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','SF Mono',monospace" font-size="92" font-weight="700" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="-1">
    Musicmeta
  </text>

  <!-- Accent line above tagline -->
  <line x1="100" y1="180" x2="800" y2="180" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="450" y="215" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','SF Mono',monospace" font-size="16" fill="#6b8db5" letter-spacing="5" opacity="0.9">
    music metadata enrichment engine
  </text>
</svg>
