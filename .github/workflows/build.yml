name: Build

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Self-check the release-notes scripts
        # Unguarded, a regression here would surface only as a release check that silently passes.
        working-directory: scripts/github-workflows
        run: for t in test_*.py; do python3 "$t"; done

      - name: Enforce the STORIES entry cap
        # STORIES has no consumer to fail, so without this the cap is an unenforced ask — which is
        # what produced the release-note walls in the first place.
        run: python3 scripts/github-workflows/check_doc_caps.py

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  # `demo/` is a separate composite build, so `./gradlew build` never compiles it — this is the only
  # in-tree consumer compiling like an external one. Not a parameter-position guard; see CLAUDE.md.
  demo-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile demo composite build
        # demo/ has no wrapper of its own — it borrows the root one via ../gradlew.
        working-directory: demo
        run: ../gradlew compileKotlin

  # Version agreement on the release PR, before any tag exists (#35).
  release-readiness:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Assert module versions agree with each other and CHANGELOG
        # Shared with release.yml's pre-publish check, so both read the same value the same way.
        run: ./scripts/github-workflows/check_versions.sh
