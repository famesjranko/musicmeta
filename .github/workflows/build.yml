name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Install pinned tooling
        # Same pinned versions developers get, so CI and local cannot disagree about what a rule
        # means. ./check refuses to run rather than silently skipping a layer whose tool is absent.
        run: |
          ./scripts/bootstrap.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run the check command
        # The same command developers and agents run locally. CI having its own step list is what
        # makes a CI failure a guessing game, so there is deliberately only one thing to run here.
        # --skip-demo only because demo-canary below is a separate required check; running it here
        # too would compile demo/ twice. Local `./check` still covers everything.
        run: ./check --skip-demo

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  # `demo/` is a separate composite build, so `./gradlew build` never compiles it — this is the only
  # in-tree consumer compiling like an external one. Not a parameter-position guard; see CLAUDE.md.
  #
  # This is the only place CI compiles demo/ — the build job passes --skip-demo so it is not done
  # twice. The job stays separate rather than folding into `build` because `demo-canary` is a
  # required status check in the `main` protection ruleset and reports under its own name; deleting
  # it would block merges to `main` waiting for a check that no longer runs.
  demo-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile demo composite build
        # demo/ has no wrapper of its own — it borrows the root one via ../gradlew.
        working-directory: demo
        run: ../gradlew compileKotlin
