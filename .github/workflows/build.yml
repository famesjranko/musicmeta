name: Build

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  # `demo/` is a separate composite build (`includeBuild("..")`) that is NOT part of
  # `settings.gradle.kts`, so `./gradlew build` above never compiles it. That makes it the only
  # in-tree consumer compiling against the published surface the way an external consumer does —
  # it broke silently in v0.9.2 for exactly that reason. This job is that canary.
  #
  # It is NOT a parameter-position guard — `apiCheck` against the committed .api baseline is. A
  # green canary means consumers still compile, not that argument order is unchanged. For why a
  # mid-list insertion can pass this job, see CLAUDE.md, which owns that rule.
  #
  # It runs on draft PRs too. Drafts cannot merge anyway, so this costs little and means a draft
  # marked ready has already reported. Note this is NOT propping up a required-check contract:
  # per the live rulesets, `main` requires only the `build` context and `dev` requires none, so
  # `demo-canary` is a required check on neither branch.
  demo-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile demo composite build
        # demo/ has no wrapper of its own; it borrows the root wrapper via ../gradlew, and
        # compileKotlin resolves musicmeta-core from local source through includeBuild("..").
        working-directory: demo
        run: ../gradlew compileKotlin

  # Version-agreement gate on the release PR (dev → main): the three module versions and the pinned
  # CHANGELOG heading must all match before any tag exists, so publish.yml's post-tag guard is
  # already known-green by tag time (issue #35). Not a required check — it just surfaces on the PR.
  release-readiness:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Assert module versions agree with each other and CHANGELOG
        # Read versions from Gradle, not grep, so we see what publish.yml would upload. Matching all
        # three to the one CHANGELOG version also proves they match each other. Empty parse fails (a
        # "" would stay green forever). shell: bash for pipefail over awk.
        shell: bash
        run: |
          set -eo pipefail
          # First `## [x.y.z]` heading, then quit; the digit pattern skips `## [Unreleased]`.
          changelog_version="$(sed -nE '/^## \[[0-9]/ { s/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/p; q; }' CHANGELOG.md)"
          if [ -z "${changelog_version}" ]; then
            echo "::error::could not read a pinned '## [x.y.z]' version heading from CHANGELOG.md"
            exit 1
          fi
          failed=0
          for module in musicmeta-core musicmeta-android musicmeta-okhttp; do
            declared="$(./gradlew -q --console=plain ":${module}:properties" \
              | awk -F': ' '/^version: / {print $2; exit}')"
            if [ -z "${declared}" ]; then
              echo "::error::could not read a declared version from :${module}"
              failed=1
              continue
            fi
            if [ "${declared}" != "${changelog_version}" ]; then
              echo "::error::module :${module} declares ${declared} but CHANGELOG pins ${changelog_version}"
              failed=1
            else
              echo ":${module} declares ${declared} — matches CHANGELOG ${changelog_version}."
            fi
          done
          [ "${failed}" -eq 0 ]
