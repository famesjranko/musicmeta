name: Build

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Run the check command
        # The same command developers and agents run locally. CI having its own step list is what
        # makes a CI failure a guessing game, so there is deliberately only one thing to run here.
        run: ./check

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  # `demo/` is a separate composite build, so `./gradlew build` never compiles it — this is the only
  # in-tree consumer compiling like an external one. Not a parameter-position guard; see CLAUDE.md.
  #
  # `./check` already runs this, so the compile happens twice per CI run. The job stays because
  # `demo-canary` is a required status check in the `main` protection ruleset and reports the
  # failure under its own name; deleting it means editing that ruleset first, or merges to `main`
  # block forever waiting for a check that no longer runs.
  demo-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile demo composite build
        # demo/ has no wrapper of its own — it borrows the root one via ../gradlew.
        working-directory: demo
        run: ../gradlew compileKotlin

  # Version agreement on the release PR, before any tag exists (#35).
  release-readiness:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Assert module versions agree with each other and CHANGELOG
        # Shared with release.yml's pre-publish check, so both read the same value the same way.
        run: ./scripts/github-workflows/check_versions.sh
