name: Build

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Self-check the release-notes validator
        # Unguarded, a regression here would surface only as a release check that silently passes.
        working-directory: scripts/github-workflows
        run: python3 test_validate_release_notes.py

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

  # `demo/` is a separate composite build, so `./gradlew build` never compiles it — this is the only
  # in-tree consumer compiling like an external one. Not a parameter-position guard; see CLAUDE.md.
  demo-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile demo composite build
        # demo/ has no wrapper of its own — it borrows the root one via ../gradlew.
        working-directory: demo
        run: ../gradlew compileKotlin

  # Version agreement on the release PR, before any tag exists (#35).
  release-readiness:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Assert module versions agree with each other and CHANGELOG
        # Read from Gradle, not grep, so this sees what would publish. An empty parse must fail —
        # "" would stay green forever. shell: bash for pipefail over awk.
        shell: bash
        run: |
          set -eo pipefail
          # First `## [x.y.z]` heading, then quit; the digit pattern skips `## [Unreleased]`.
          changelog_version="$(sed -nE '/^## \[[0-9]/ { s/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/p; q; }' CHANGELOG.md)"
          if [ -z "${changelog_version}" ]; then
            echo "::error::could not read a pinned '## [x.y.z]' version heading from CHANGELOG.md"
            exit 1
          fi
          failed=0
          for module in musicmeta-core musicmeta-android musicmeta-okhttp; do
            declared="$(./gradlew -q --console=plain ":${module}:properties" \
              | awk -F': ' '/^version: / {print $2; exit}')"
            if [ -z "${declared}" ]; then
              echo "::error::could not read a declared version from :${module}"
              failed=1
              continue
            fi
            if [ "${declared}" != "${changelog_version}" ]; then
              echo "::error::module :${module} declares ${declared} but CHANGELOG pins ${changelog_version}"
              failed=1
            else
              echo ":${module} declares ${declared} — matches CHANGELOG ${changelog_version}."
            fi
          done
          [ "${failed}" -eq 0 ]
