name: Provider API drift watch

# Scheduled watch for third-party provider drift. Scheduled, not change-triggered, because the
# trigger is external: a provider changes its JSON with zero commits here, and org.json's opt*
# family turns that into a *successful* enrichment containing nothing. Never gating — see
# CHANGELOG 0.10.0 (#16).
#
# This used to be 476 lines, most of it building a summary and then creating, updating, reopening
# and closing a public tracking issue with redacted bodies. A failed scheduled run already emails
# the maintainer and keeps its log for 90 days, which is the same signal for one person. The
# machinery around that signal was maintaining a second issue tracker.

on:
  schedule:
    # Daily, 05:00 UTC. Daily rather than weekly because bad values are cached with TTLs up to
    # 7 days, so a weekly cadence could leave consumers holding empty data for a fortnight.
    - cron: '0 5 * * *'
  workflow_dispatch:

# Never pull_request_target: this job holds provider API keys, which that trigger would expose to
# fork-authored code. schedule + workflow_dispatch only, both of which require write access.

permissions:
  contents: read

concurrency:
  group: provider-drift-watch
  cancel-in-progress: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # SHA-pinned, not tag-pinned: this job has provider secrets in scope and a tag is mutable.
      # Bumping means updating the digest — the action's commit SHA, not the tag-object SHA.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17

      # Commit SHA, not the v6.2.0 tag-object SHA that `refs/tags/v6` dereferences to in one hop.
      # Both are immutable, but only this form is what pinning tooling emits and verifies.
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Check provider credentials are configured
        shell: bash
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          FANARTTV_API_KEY: ${{ secrets.FANARTTV_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LISTENBRAINZ_TOKEN: ${{ secrets.LISTENBRAINZ_TOKEN }}
        run: |
          set -eo pipefail
          # A missing key is our misconfiguration, not drift: prop() returns "" with no skip, so
          # the run would fail daily about our own secrets and teach everyone to ignore it. Fail
          # here instead, with a message that says which — and names only, never values.
          missing=""
          for name in LASTFM_API_KEY FANARTTV_API_KEY DISCOGS_TOKEN LISTENBRAINZ_TOKEN; do
            if [ -z "${!name:-}" ]; then
              missing="${missing}${name} "
            fi
          done
          if [ -n "${missing}" ]; then
            echo "::error::Provider credentials not configured: ${missing}— fix the repository secrets. This is not provider drift."
            exit 1
          fi
          echo "All four provider credentials are present."

      - name: Run E2E suite against live provider APIs
        # `shell: bash` is load-bearing: without pipefail, `gradlew | tee` reports tee's status
        # (always 0) and this step is permanently `success`. That bug shipped once already.
        shell: bash
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          FANARTTV_API_KEY: ${{ secrets.FANARTTV_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LISTENBRAINZ_TOKEN: ${{ secrets.LISTENBRAINZ_TOKEN }}
        # `--tests` scopes this to the e2e package: unscoped, any ordinary unit-test regression on
        # the default branch would look like provider drift. Retried once — 11 live APIs from a
        # shared runner IP, so a lone 429/503 is noise, not drift.
        run: |
          set -eo pipefail
          if ./gradlew :musicmeta-core:test -Dinclude.e2e=true \
               --tests "com.landofoz.musicmeta.e2e.*" 2>&1 | tee e2e.log; then
            exit 0
          fi
          echo "::notice::E2E suite failed on the first attempt — retrying once to rule out a transient provider error."
          sleep 60
          ./gradlew :musicmeta-core:test -Dinclude.e2e=true --rerun-tasks \
            --tests "com.landofoz.musicmeta.e2e.*" 2>&1 | tee e2e.log

      - name: Upload test reports
        # Runs on failure too — the point of the job is the failing run, and the HTML report names
        # which provider and which field, which the console output does not.
        if: always()
        # Tag-pinned, matching build.yml. The SHA pins above exist because those steps run with
        # provider secrets in the job environment; this one does not, and inventing a digest that
        # has not been verified against the registry would be worse than a tag.
        uses: actions/upload-artifact@v7
        with:
          name: e2e-reports
          path: |
            e2e.log
            musicmeta-core/build/reports/tests/test/
          retention-days: 30
