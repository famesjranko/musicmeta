name: Provider API drift watch

# Scheduled watch for THIRD-PARTY provider drift — the inverse of api-drift.yml.
#
# api-drift.yml watches musicmeta's own published ABI: it protects our consumers from us.
# This job watches the other direction: a provider (MusicBrainz, Deezer, Last.fm, Discogs, …)
# changing their JSON or endpoints underneath us, which breaks musicmeta's ability to enrich.
#
# That failure is silent by construction. Every parser uses org.json's opt* family, which returns
# a default on a missing key rather than throwing — so a renamed field yields "" and flows through
# as a *successful* enrichment containing nothing. It has shipped before: v0.9.1 fixed ListenBrainz
# `track_name` -> `recording_name` and a nested `release` -> top-level `release_name`, both of which
# reached users as empty values, and both of which then sat in consumers' caches for up to the TTL.
#
# Critically, this failure arrives with ZERO commits to this repo. Every other gate here is
# change-triggered — a PR, a push, a tag. A provider deploys on their schedule while our tree is
# untouched and every check is green. That is why the detector has to be scheduled: the trigger is
# external, so the watcher must be too.
#
# Never gating. conventions.md §6 is right that third-party rate limits and outages must not be able
# to block a merge. This does not change that — it gives the signal an owner instead of no home.

on:
  schedule:
    # Daily, 05:00 UTC. Daily rather than weekly because bad values are cached with TTLs up to
    # 7 days, so a weekly cadence could leave consumers holding empty data for a fortnight.
    - cron: '0 5 * * *'
  workflow_dispatch:

# Deliberately NOT triggered by pull_request, and never by pull_request_target. This job holds
# provider API keys; pull_request_target would expose them to fork-authored code. With only
# schedule and workflow_dispatch, the sole ways to run it are the schedule (which runs as the repo)
# and a manual dispatch (which requires write access).

permissions:
  contents: read
  issues: write

concurrency:
  group: provider-drift-watch
  # External writes (create/edit/close the tracking issue). Do not cancel mid-write.
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      # Actions are SHA-pinned, not tag-pinned, because this job has provider secrets in scope.
      # A tag is mutable: if `actions/checkout@v4` were ever repointed, it would run with those
      # secrets available. See #10, which tracks the runtime bump for the other workflows — it
      # must update these digests too, not just the tags.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: dev

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      # Commit SHA, not the v4.4.3 tag-object SHA that `refs/tags/v4` dereferences to in one hop.
      # Both are immutable, but only this form is what pinning tooling emits and verifies.
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Check provider credentials are configured
        id: preflight
        shell: bash
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          FANARTTV_API_KEY: ${{ secrets.FANARTTV_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LISTENBRAINZ_TOKEN: ${{ secrets.LISTENBRAINZ_TOKEN }}
        run: |
          set -eo pipefail
          # A missing key is a MISCONFIGURATION, not provider drift, and the two must not be
          # reported the same way. E2ETestFixture.prop() returns "" for an absent key with no
          # skip, so the keyed tests would simply fail — and without this check the watch would
          # file a "provider drifted" issue every single day about our own missing secrets.
          # Only the names are ever printed. Never the values.
          missing=""
          for name in LASTFM_API_KEY FANARTTV_API_KEY DISCOGS_TOKEN LISTENBRAINZ_TOKEN; do
            if [ -z "${!name:-}" ]; then
              missing="${missing}${name} "
            fi
          done
          if [ -n "${missing}" ]; then
            echo "missing=${missing}" >> "$GITHUB_OUTPUT"
            echo "::warning::Provider credentials not configured: ${missing}— keyed providers will be reported as misconfigured, not as drift."
          else
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "All four provider credentials are present."
          fi

      - name: Run E2E suite against live provider APIs
        id: e2e
        # Non-fatal: a red suite is the signal this job exists to report, not a reason to abort
        # before the issue is filed. Its outcome is folded into the tracking issue below.
        continue-on-error: true
        # `shell: bash` is load-bearing. The Actions default for `run:` is `bash -e {0}` with no
        # pipefail, so in `gradlew ... | tee` the pipeline's status is tee's — always 0 — and this
        # step's outcome would be permanently `success`. That exact bug shipped in api-drift.yml
        # and was caught in review; do not re-introduce it here.
        shell: bash
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          FANARTTV_API_KEY: ${{ secrets.FANARTTV_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LISTENBRAINZ_TOKEN: ${{ secrets.LISTENBRAINZ_TOKEN }}
        # musicmeta-core/build.gradle.kts already forwards these four env vars to the test JVM,
        # so no build change is needed. The suite is 70 tests across 5 classes, all gated behind
        # -Dinclude.e2e=true.
        #
        # `--tests` scopes this to the e2e package. Without it the task runs all 745 core tests, and
        # any ordinary unit-test regression on `dev` would file an issue claiming a third-party
        # provider changed its API — daily, until someone fixed it.
        #
        # Retried once on failure. This job talks to 11 live third-party APIs from a shared runner
        # egress IP; a single 429 or 503 is noise, not drift. Two failures in a row is weak evidence
        # but far better than one, and it costs one extra run only when something is already wrong.
        run: |
          set -eo pipefail
          if ./gradlew :musicmeta-core:test -Dinclude.e2e=true \
               --tests "com.landofoz.musicmeta.e2e.*" 2>&1 | tee e2e.log; then
            exit 0
          fi
          echo "::notice::E2E suite failed on the first attempt — retrying once to rule out a transient provider error."
          sleep 60
          ./gradlew :musicmeta-core:test -Dinclude.e2e=true --rerun-tasks \
            --tests "com.landofoz.musicmeta.e2e.*" 2>&1 | tee e2e.log

      - name: Summarise failures
        id: summary
        # Runs even when the suite failed — that is the case we most need summarised.
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -eo pipefail
          # UTF-8 explicitly: under a non-UTF-8 locale the parser below dies printing a non-ASCII
          # assertion message (music metadata is full of them — Motörhead, Sigur Rós, Björk), which
          # would abort this step part-way through redaction.
          export PYTHONIOENCODING=utf-8
          export LC_ALL=C.UTF-8

          # FAIL CLOSED. Everything is built in a scratch file and only promoted to the name the
          # report step reads (`e2e-summary.txt`) once parsing AND both redaction passes have
          # completed. `set -e` aborts this step on any failure in between, and the trap removes the
          # scratch file, so a partially-redacted summary can never survive to be published. The
          # earlier version wrote e2e-summary.txt up front via shell redirection, which meant an
          # abort mid-redaction left a half-redacted file on disk that the report step happily
          # posted to a public issue.
          export RAW=summary.raw
          trap 'rm -f "$RAW" e2e-summary.part' EXIT

          rm -f e2e-summary.txt

          python3 - > "$RAW" <<'PY'
          import glob, xml.etree.ElementTree as ET

          total = failed = errored = skipped = 0
          e2e_ran = 0
          rows = []
          for path in glob.glob("musicmeta-core/build/test-results/**/*.xml", recursive=True):
              try:
                  root = ET.parse(path).getroot()
              except Exception:
                  # Unparseable results file — report it rather than dropping the class silently.
                  rows.append(f"- **[unparseable results file]** {path}")
                  continue
              if root.tag != "testsuite":
                  continue
              tests = int(root.get("tests", 0))
              skips = int(root.get("skipped", 0))
              total += tests
              failed += int(root.get("failures", 0))
              errored += int(root.get("errors", 0))
              skipped += skips
              if ".e2e." in (root.get("name") or ""):
                  e2e_ran += tests - skips
              for case in root.iter("testcase"):
                  for bad in list(case.findall("failure")) + list(case.findall("error")):
                      cls = (case.get("classname") or "").rsplit(".", 1)[-1]
                      # NOT truncated here. Truncation happens after redaction — cutting first can
                      # bisect a credential into a fragment the literal-value pass no longer matches.
                      msg = " ".join((bad.get("message") or "").split())
                      rows.append(f"- **{cls}.{case.get('name')}** — {msg}")

          print(f"TOTAL={total} FAILED={failed} ERRORED={errored} SKIPPED={skipped} E2E_RAN={e2e_ran}")
          print("---")
          for r in rows:
              print(r)
          PY

          # Surface how many e2e tests actually executed. If the -Dinclude.e2e gating ever breaks,
          # all 70 skip, the task exits 0, and without this the watch would report "healthy" and
          # close a real tracker on its way out.
          # `|| true` with an explicit default: unguarded under `set -eo pipefail`, a no-match here
          # would abort the step with no diagnosis, reading as an unexplained summariser failure.
          e2e_ran="$(grep -o 'E2E_RAN=[0-9]*' "$RAW" | head -1 | cut -d= -f2 || true)"
          echo "E2E_RAN=${e2e_ran:-unknown}" >> "$GITHUB_OUTPUT"

          # REDACTION — this output goes into a PUBLIC issue body, and provider request URLs embed
          # credentials (Last.fm carries api_key=, Discogs carries token=).
          #
          # Pass 1: credential-shaped query parameters.
          sed -i -E 's/([?&](api_key|apikey|api-key|token|key|auth)=)[^&[:space:]"'"'"']*/\1REDACTED/gI' "$RAW"

          # Pass 2: the literal secret values, for forms pass 1 cannot reach — a header dump, a
          # toString() of a params map, a bare key in free text.
          #
          # Matching the raw env value is not enough. A secret pasted into GitHub with a trailing
          # newline or flanking spaces is stored with them, so the literal never matches the key as
          # it appears in output, and the credential is published. That is the single most common
          # way secrets are stored. Redact the stripped value and every non-empty line of it.
          for name in LASTFM_API_KEY FANARTTV_API_KEY DISCOGS_TOKEN LISTENBRAINZ_TOKEN; do
            value="${!name:-}"
            [ -n "${value}" ] || continue
            SECRET_NAME="${name}" SECRET_VALUE="${value}" python3 <<'PY'
          import os, pathlib, sys

          name = os.environ["SECRET_NAME"]
          raw = os.environ["SECRET_VALUE"]

          # Every variant worth redacting. The whitespace-normalised forms are load-bearing: the
          # parser above collapses all runs of whitespace inside each message (" ".join(msg.split())),
          # so a secret containing a tab or two consecutive spaces appears in the text in a form the
          # raw value never matches, and would be published verbatim. splitlines() alone does not
          # cover it — it splits on newlines, not tabs.
          #
          # Anything shorter than 8 characters is not safely redactable — it would match ordinary
          # words and turn the body to noise — so fail the step rather than publish it.
          variants = (
              {raw.strip(), " ".join(raw.split())}
              | {ln.strip() for ln in raw.splitlines()}
              | {" ".join(ln.split()) for ln in raw.splitlines()}
          )
          variants = {v for v in variants if v}
          too_short = sorted(v for v in variants if len(v) < 8)
          if too_short:
              print(f"::error::{name} contains a value shorter than 8 characters, which cannot be "
                    f"safely redacted from a public issue body. Refusing to continue.", file=sys.stderr)
              sys.exit(1)

          p = pathlib.Path(os.environ["RAW"])
          text = p.read_text(encoding="utf-8")
          for v in sorted(variants, key=len, reverse=True):
              text = text.replace(v, "REDACTED")
          p.write_text(text, encoding="utf-8")
          PY
          done

          # Truncate only now that the text is redacted — cutting first can bisect a credential into
          # a fragment the literal-value pass no longer matches.
          #
          # Both the per-line cap and the whole-file cap are applied HERE, in Python, on character
          # and line boundaries. The report step therefore just cats this file. Doing the file-level
          # cap there with `head -c` meant cutting mid-character, and the `iconv -c` guard added to
          # repair that exits 1 on an incomplete sequence at end of input — which, inside the
          # `{ … } > issue-body.md` block under `set -euo pipefail`, aborted the whole report step
          # and filed nothing. That turned the largest drift events into silent no-files: exactly
          # the failure this workflow exists to remove.
          python3 - <<'PY'
          import os, pathlib

          limit = int(os.environ.get("SUMMARY_BODY_LIMIT", "40000"))
          src = pathlib.Path(os.environ["RAW"]).read_text(encoding="utf-8")

          lines = []
          for line in src.splitlines():
              lines.append(line if len(line) <= 400 else line[:400] + " …[line truncated]")

          out, used, dropped = [], 0, 0
          for line in lines:
              # +1 for the newline. Measured in characters; UTF-8 bytes >= characters, and the
              # consumer limit is characters, so this is the correct unit and errs safe.
              if used + len(line) + 1 > limit:
                  dropped += 1
                  continue
              out.append(line)
              used += len(line) + 1
          if dropped:
              out.append(f"… {dropped} further line(s) omitted to stay within the issue-body limit.")

          pathlib.Path("e2e-summary.part").write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

          # Promote only after every pass succeeded.
          mv e2e-summary.part e2e-summary.txt
          echo "Summary assembled and redacted ($(wc -c < e2e-summary.txt) bytes)."
        env:
          # Applied here rather than in the report step so the cut lands on a character boundary.
          SUMMARY_BODY_LIMIT: '40000'
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          FANARTTV_API_KEY: ${{ secrets.FANARTTV_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LISTENBRAINZ_TOKEN: ${{ secrets.LISTENBRAINZ_TOKEN }}

      - name: File, update, or close the tracking issue
        # `!cancelled()` rather than `always()`: always() also fires during cancellation, and this
        # step performs external writes. Reaching it after an earlier failure means earlier steps
        # may have been SKIPPED, so every file read below is guarded.
        if: ${{ !cancelled() }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit, so gh never has to infer the repo from a git remote — checkout itself can fail.
          GH_REPO: ${{ github.repository }}
          E2E_RESULT: ${{ steps.e2e.outcome }}
          # The summariser's outcome gates whether its output may be published at all. It writes
          # the redacted summary; if it did not finish, its output is not trustworthy.
          SUMMARY_RESULT: ${{ steps.summary.outcome }}
          E2E_RAN: ${{ steps.summary.outputs.E2E_RAN }}
          MISSING_KEYS: ${{ steps.preflight.outputs.missing }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Byte budget for the failure summary. GitHub caps an issue body at 65536 characters,
          # and UTF-8 bytes >= characters, so bounding bytes bounds characters.
          SUMMARY_BODY_LIMIT: '40000'
        run: |
          set -euo pipefail

          TITLE_MARKER='[provider-drift-bot]'
          TITLE="${TITLE_MARKER} Provider API drift detected against live endpoints"
          TRACKER_LABEL='provider-drift'

          suite_failed=false
          if [ "${E2E_RESULT}" != "success" ]; then
            suite_failed=true
          fi

          misconfigured=false
          if [ -n "${MISSING_KEYS}" ]; then
            misconfigured=true
          fi

          # The summariser is what redacts credentials. If it did not complete, its output must be
          # treated as unpublishable regardless of whether a file happens to exist on disk.
          summary_usable=true
          if [ "${SUMMARY_RESULT}" != "success" ]; then
            summary_usable=false
          fi

          # Zero e2e tests executed is a fault, not health. Every e2e class gates on
          # Assume.assumeTrue(include.e2e), which marks tests SKIPPED rather than failed — so if the
          # gating ever breaks, all 70 skip, Gradle exits 0, and a naive reading would call that
          # "providers healthy" and close a real tracker.
          # `case` rather than `[ -eq ]`: a non-numeric value makes `-eq` exit 2, which under the
          # `&&` chain silently yields zero_e2e=false — i.e. an unexpected value would fail OPEN and
          # let the healthy branch close a real tracker. Anything not a plain integer is treated as
          # a fault.
          zero_e2e=false
          if [ "${SUMMARY_RESULT}" = "success" ]; then
            case "${E2E_RAN}" in
              *[!0-9]*|'') zero_e2e=true ;;
              0)           zero_e2e=true ;;
              *)           zero_e2e=false ;;
            esac
          fi

          # Look the tracker up by LABEL, not by title text. GitHub's issue-search tokenizer strips
          # bracket punctuation, so a `[provider-drift-bot] in:title` search degrades to the words
          # "provider drift bot" ranked by relevance — which can page the real tracker out. See #14,
          # which tracks retrofitting this same fix onto api-drift.yml. `|| true` because an
          # unguarded gh call under `set -e` would abort before anything is filed; an empty result
          # correctly routes to `gh issue create`.
          existing="$(gh issue list --state open --label "${TRACKER_LABEL}" --limit 100 \
            --json number --jq '.[0].number // empty' || true)"

          # Fall back to a title search if the label lookup found nothing. `gh issue list --label`
          # on a DELETED label exits 0 with empty output, so without this a maintainer removing the
          # label during triage would silently route every run to `create` — filing a fresh
          # duplicate tracker every single day. The title search is weaker (GitHub's tokenizer
          # strips the bracket punctuation, so it degrades to relevance-ranked words), which is why
          # it is the fallback rather than the primary, but it is enough to find our own issue.
          if [ -z "${existing}" ]; then
            existing="$(gh issue list --state open --limit 100 --search "${TITLE_MARKER} in:title" \
              --json number,title \
              --jq '[.[] | select(.title | startswith("'"${TITLE_MARKER}"'"))][0].number // empty' || true)"
            if [ -n "${existing}" ]; then
              echo "::warning::Found tracker #${existing} by title, not by label — the '${TRACKER_LABEL}' label may have been removed. Re-applying."
              gh issue edit "${existing}" --add-label "${TRACKER_LABEL}" || true
            fi
          fi

          if [ "${suite_failed}" = "false" ] && [ "${misconfigured}" = "false" ] \
             && [ "${summary_usable}" = "true" ] && [ "${zero_e2e}" = "false" ]; then
            if [ -n "${existing}" ]; then
              gh issue close "${existing}" \
                --comment "Resolved: the full E2E suite passes against live provider APIs as of ${RUN_URL}. Closing automatically." \
                --reason completed
              echo "Closed tracking issue #${existing} — providers healthy."
            else
              echo "Providers healthy, no open tracker. Nothing to do."
            fi
            exit 0
          fi

          {
            echo "The scheduled watch found a divergence between musicmeta and live provider APIs."
            echo
            echo "- **E2E suite result:** ${E2E_RESULT}"
            echo "- **E2E tests actually executed:** ${E2E_RAN:-unknown}"
            echo "- **Credentials missing (misconfiguration, not drift):** ${MISSING_KEYS:-none}"
            echo "- **Summariser step:** ${SUMMARY_RESULT}"
            echo
            if [ "${zero_e2e}" = "true" ]; then
              echo "> **No E2E tests executed.** The suite reported success but ran zero e2e tests,"
              echo "> which means the \`-Dinclude.e2e=true\` gating is no longer taking effect —"
              echo "> the watch is silently inert. This is a fault in the watch, not provider drift."
              echo
            fi
            if [ "${summary_usable}" = "false" ]; then
              echo "> **Test summary withheld.** The summariser step reported"
              echo "> \`${SUMMARY_RESULT}\`, and it is the step that strips credentials from test"
              echo "> output. Its output is therefore not safe to publish and has been omitted."
              echo "> See the run log — which is not public — for the failure detail."
              echo
            fi
            echo "Run: ${RUN_URL}"
            echo
            if [ "${misconfigured}" = "true" ]; then
              echo "> **Configure these repository secrets before trusting this result:**"
              echo "> \`${MISSING_KEYS}\`"
              echo ">"
              echo "> Tests for those providers fail rather than skip when a key is absent"
              echo "> (\`E2ETestFixture.prop()\` returns an empty string), so failures below may be"
              echo "> misconfiguration rather than a provider change."
              echo
            fi
            if [ "${summary_usable}" = "true" ] && [ -f e2e-summary.txt ]; then
              echo "### Failing tests"
              echo
              echo '```'
              # Plain `cat`: the summariser already capped this file on character and line
              # boundaries, and says so inline when it dropped anything. Capping here instead meant
              # `head -c` cutting mid-character, and the `iconv` guard for that exits 1 on an
              # incomplete sequence at end of input — which inside this `{ … }` block under
              # `set -euo pipefail` killed the step and filed nothing at all.
              cat e2e-summary.txt
              echo '```'
              echo
            else
              echo "_No test summary was produced — the suite step did not reach the summariser._"
              echo "_See ${RUN_URL}._"
              echo
            fi
            echo "### What to check"
            echo
            echo "A provider renaming or moving a field does **not** raise an error here — the"
            echo "parsers use \`org.json\`'s \`opt*\` accessors, which return a default on a missing"
            echo "key. Symptoms are empty strings and absent values, not exceptions. Compare the"
            echo "failing assertion against the provider's current response shape before assuming"
            echo "the test is wrong."
            echo
            echo "A confirmed provider break is a **patch** release: fix the parser, pin the new"
            echo "shape as a unit-test fixture, ship \`0.x.y\`. The signature and ABI are unchanged,"
            echo "so the 0.x carve-out permits a patch (see \`CLAUDE.md\`)."
            echo
            echo "---"
            echo "_Filed and maintained automatically by the provider drift watch. Updated in place"
            echo "on each run and closed automatically once the suite passes again._"
          } > issue-body.md

          if [ -n "${existing}" ]; then
            # Capture the body BEFORE overwriting it, so the comparison below is against the
            # previous run rather than against what we just wrote.
            gh issue view "${existing}" --json body --jq .body > previous-body.md 2>/dev/null || true
            gh issue edit "${existing}" --title "${TITLE}" --body-file issue-body.md
            # Only comment when the detail actually changed. This runs daily; without the check,
            # every day of an ongoing provider outage adds a "still failing" comment saying nothing
            # new, and the issue becomes unreadable within a week.
            #
            # Compare NORMALISED bodies. The body embeds RUN_URL, which carries a per-run id, so a
            # raw diff always reports a change and the gate is a no-op — worse, the comment then
            # asserts "the detail changed" when only the run id did. Strip the run id, and strip CR
            # because GitHub may hand the body back with different line endings than we uploaded.
            norm() { sed -E 's#/actions/runs/[0-9]+#/actions/runs/RUN#g' "$1" | tr -d '\r'; }
            norm previous-body.md > prev.norm
            norm issue-body.md > curr.norm
            if ! diff -q prev.norm curr.norm >/dev/null 2>&1; then
              gh issue comment "${existing}" \
                --body "Still failing as of ${RUN_URL}, and the detail changed since the last run. Body updated."
            fi
            echo "Updated existing tracking issue #${existing}."
          else
            # Label-less fallback: `gh issue create --label` fails outright if a label is missing,
            # and without this the watch would file nothing at all — every day — because one label
            # got deleted. The title-based lookup above is what keeps a label-less issue findable.
            gh issue create --title "${TITLE}" --body-file issue-body.md \
              --label "${TRACKER_LABEL}" --label area/provider \
            || gh issue create --title "${TITLE}" --body-file issue-body.md
            echo "Filed new tracking issue."
          fi
