name: API drift watch

# Scheduled drift watch for `dev`. The PR gate catches an API *change*; this catches *drift* — a
# baseline that stopped matching reality for reasons other than the PR at hand (dependency bump,
# Kotlin upgrade, stale .api merged in) — and gives it an owner via a single tracking issue.
# Also folds in the demo/ canary, which `./gradlew build` never compiles.

on:
  schedule:
    # Weekly, Mondays 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Minimal surface: read the code, write the tracking issue. No new secrets — GITHUB_TOKEN only.
permissions:
  contents: read
  issues: write

concurrency:
  group: api-drift-watch
  # This job performs external writes (create/edit/close the tracking issue). Do not cancel a run
  # mid-write — let an in-flight run finish rather than leave a half-updated issue.
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Regenerate API baselines
        id: apidump
        # Non-fatal: if `dev` fails to compile or apiDump errors, that is itself a rot signal the
        # watcher must report — not a red run that aborts before the issue is filed. Its outcome is
        # folded into the tracking issue by the reporting step below.
        continue-on-error: true
        # `shell: bash` is load-bearing: the default `bash -e {0}` has no pipefail, so in
        # `gradlew | tee` the status is tee's (always 0) and a broken dev would report healthy.
        shell: bash
        run: ./gradlew apiDump 2>&1 | tee apidump.log

      - name: Detect API drift
        id: api
        run: |
          set -euo pipefail
          if [ "${{ steps.apidump.outcome }}" != "success" ]; then
            # apiDump could not produce baselines to compare — record the failure, skip the diff.
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "apidump_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "apidump_failed=false" >> "$GITHUB_OUTPUT"
          # Stage first: plain `git diff` only sees tracked files, so a brand-new module's baseline
          # would be invisible — drift that reports clean.
          git add -A -- '*/api/*.api'
          if git diff --cached --quiet -- '*/api/*.api'; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git diff --cached -- '*/api/*.api' > api-drift.diff
          fi
          # Reset the tree so the diff never leaks into any later step: unstage, restore the
          # tracked baselines, then drop any newly generated untracked ones.
          git reset -q -- '*/api/*.api'
          git checkout -- '*/api/*.api'
          git clean -fq -- '*/api/*.api'

      - name: Compile demo composite build
        id: demo
        continue-on-error: true
        working-directory: demo
        # A failure here is a silent-rot signal, not a hard job failure — folded into the
        # tracking issue rather than going red. `shell: bash` for pipefail; see apiDump above.
        shell: bash
        run: ../gradlew compileKotlin 2>&1 | tee ../demo-compile.log

      - name: File, update, or close the tracking issue
        # Runs even if detect failed — otherwise the watch files nothing, silently, which is the
        # failure this workflow exists to prevent. `!cancelled()` not `always()`: this step writes
        # externally, and a half-write during teardown is what `concurrency` above refuses.
        # Earlier steps may have been SKIPPED, so their log files may not exist below.
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit, so `gh` never has to infer the repo from a git remote. This step now runs
          # after an earlier failure (see the condition below), and one thing that can fail is
          # `actions/checkout` — leaving no repository for `gh` to infer from.
          GH_REPO: ${{ github.repository }}
          API_DRIFT: ${{ steps.api.outputs.drift }}
          APIDUMP_FAILED: ${{ steps.api.outputs.apidump_failed }}
          DEMO_RESULT: ${{ steps.demo.outcome }}
          DETECT_RESULT: ${{ steps.api.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Byte budgets: GitHub caps an issue body at 65536 chars and bytes >= chars, so bounding
          # bytes bounds chars. 40000 + 16000 = 56000, leaving ~9KB for boilerplate.
          DIFF_BODY_LIMIT: '40000'
          LOG_BODY_LIMIT: '16000'
        run: |
          set -euo pipefail

          # TRACKER_LABEL is the tracker's identity, not a category: this job retitles, rewrites and
          # auto-closes whatever open issue carries it. Never apply it to a hand-filed issue.
          TITLE_MARKER='[api-drift-bot]'
          TITLE="${TITLE_MARKER} API drift / demo-canary breakage on dev"
          TRACKER_LABEL='api-drift'

          demo_broken=false
          if [ "${DEMO_RESULT}" != "success" ]; then
            demo_broken=true
          fi

          apidump_failed=false
          if [ "${APIDUMP_FAILED}" = "true" ]; then
            apidump_failed=true
          fi

          # Detect may have failed outright, leaving outputs empty rather than true/false. An
          # empty API_DRIFT must never fall through to the healthy branch and close the tracker.
          detect_failed=false
          if [ "${DETECT_RESULT}" != "success" ] || [ -z "${API_DRIFT}" ]; then
            detect_failed=true
          fi

          # By label, not title: the search tokenizer strips brackets, so a title match degrades
          # to ranked words and can page out of 100 results, filing a duplicate weekly (#14).
          # `|| true` so a 502 cannot abort before anything is filed.
          existing="$(gh issue list --state open --label "${TRACKER_LABEL}" --limit 100 \
            --json number --jq '.[0].number // empty' || true)"

          # `gh issue list --label` on a DELETED label exits 0 with empty output, so without this
          # fallback a maintainer removing the label during triage routes every run to `create`.
          if [ -z "${existing}" ]; then
            existing="$(gh issue list --state open --limit 100 --search "${TITLE_MARKER} in:title" \
              --json number,title \
              --jq '[.[] | select(.title | startswith("'"${TITLE_MARKER}"'"))][0].number // empty' || true)"
            if [ -n "${existing}" ]; then
              echo "::warning::Found tracker #${existing} by title, not by label — the '${TRACKER_LABEL}' label may have been removed. Re-applying."
              gh issue edit "${existing}" --add-label "${TRACKER_LABEL}" || true
            fi
          fi

          if [ "${API_DRIFT}" = "false" ] && [ "${demo_broken}" = "false" ] \
             && [ "${apidump_failed}" = "false" ] && [ "${detect_failed}" = "false" ]; then
            # Healthy. Close the tracker if one is open; otherwise do nothing.
            if [ -n "${existing}" ]; then
              gh issue close "${existing}" \
                --comment "Resolved: \`apiDump\` matches the committed baselines and the demo composite build compiles as of ${RUN_URL}. Closing automatically." \
                --reason completed
              echo "Closed tracking issue #${existing} — drift resolved."
            else
              echo "No drift, no open tracker. Nothing to do."
            fi
            exit 0
          fi

          # Drift and/or demo breakage present — assemble one body.
          {
            echo "Automated watch on \`dev\` detected a divergence that the PR gate does not catch."
            echo
            echo "- **API baseline drift:** ${API_DRIFT:-unknown}"
            echo "- **\`apiDump\` failed (dev may not compile):** ${apidump_failed}"
            echo "- **demo composite build broken:** ${demo_broken}"
            echo "- **drift-detection step itself failed:** ${detect_failed}"
            echo
            echo "Run: ${RUN_URL}"
            echo
            if [ "${apidump_failed}" = "true" ]; then
              echo "### \`./gradlew apiDump\` failure output"
              echo
              if [ -f apidump.log ]; then
                echo '```'
                tail -n 60 apidump.log | tail -c "${LOG_BODY_LIMIT}"
                echo '```'
              else
                echo "_No \`apidump.log\` — the step did not run. See ${RUN_URL}._"
              fi
              echo
            fi
            if [ "${API_DRIFT}" = "true" ] && [ -f api-drift.diff ]; then
              echo "### \`apiDump\` diff against committed baselines"
              echo
              echo '```diff'
              # Bounded: core.api alone is ~2400 lines, so a reformatting ABI bump would blow
              # the 65536 cap, `gh` returns 422, and the biggest drift events would file nothing.
              diff_bytes="$(wc -c < api-drift.diff)"
              head -c "${DIFF_BODY_LIMIT}" api-drift.diff
              # Close the fence on its own line. `head -c` can stop mid-line, so emit a newline
              # first only when the truncation actually cut one — otherwise the fence would be
              # preceded by a stray blank line on every untruncated diff.
              if [ "${diff_bytes}" -gt "${DIFF_BODY_LIMIT}" ]; then echo; fi
              echo '```'
              if [ "${diff_bytes}" -gt "${DIFF_BODY_LIMIT}" ]; then
                # Outside the fence, so the backticks below render as code rather than literally.
                echo
                echo "_Diff truncated at ${DIFF_BODY_LIMIT} of ${diff_bytes} bytes._ Reproduce in full with"
                echo "\`./gradlew apiDump && git diff -- '*/api/*.api'\` on \`dev\`, or see ${RUN_URL}."
              fi
              echo
            fi
            if [ "${demo_broken}" = "true" ]; then
              echo "### demo \`../gradlew compileKotlin\` output"
              echo
              if [ ! -f demo-compile.log ]; then
                # demo is implicitly `if: success()`, so it SKIPS after an earlier failure —
                # outcome reads `skipped` (demo_broken=true) but no log exists, and an unguarded
                # `tail` would abort the step under `set -euo pipefail` and file nothing.
                echo "_The demo compile step reported \`${DEMO_RESULT}\` and wrote no log — it was"
                echo "most likely skipped because an earlier step failed. See ${RUN_URL}._"
              else
                echo '```'
                # `tail -n` caps lines, not bytes, and Gradle emits single lines thousands of
                # chars long — so cap bytes too, or this plus the diff can exceed the 65536 limit.
                tail -n 60 demo-compile.log | tail -c "${LOG_BODY_LIMIT}"
                echo '```'
              fi
              echo
            fi
            echo "---"
            echo "_Filed and maintained automatically by the API drift watch. This issue is updated"
            echo "in place on each run and closed automatically once \`dev\` is clean again._"
          } > issue-body.md

          if [ -n "${existing}" ]; then
            gh issue edit "${existing}" --title "${TITLE}" --body-file issue-body.md
            gh issue comment "${existing}" \
              --body "Drift still present as of ${RUN_URL}. Issue body updated with the latest diff."
            echo "Updated existing tracking issue #${existing}."
          else
            # TRACKER_LABEL is what the lookup keys on, so a tracker filed without it is invisible
            # next run. The label-less fallback stays regardless: `--label` fails outright on a
            # missing label, and filing something the title fallback can find beats filing nothing.
            gh issue create --title "${TITLE}" --body-file issue-body.md \
              --label "${TRACKER_LABEL}" --label area/ci --label enhancement || \
            gh issue create --title "${TITLE}" --body-file issue-body.md
            echo "Filed new tracking issue."
          fi
