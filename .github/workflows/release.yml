name: Release

# Gate 3 of the release flow — see docs/project/release.md. Tag-last: the tag is derived from a
# version this workflow has already verified, so a tag that disagrees with the published artifact
# cannot be created. Three jobs, not three steps: publishing to Central is not idempotent, so the
# job boundary is what lets "Re-run failed jobs" retry a failed tag or a timed-out poll.

on:
  workflow_dispatch:
    inputs:
      version:
        description: '(optional) Version to release, e.g. 0.11.0. Blank = read gradle.properties.'
        required: false
        default: ''
      mode:
        description: 'verify = checks only. stage = upload a droppable rehearsal to the portal. release = publish for real.'
        type: choice
        required: true
        default: verify
        options: [verify, stage, release]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Resolve the version and refuse a non-main ref
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -eo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::run this from main — releases are cut from the release branch (got ${GITHUB_REF_NAME})"
            exit 1
          fi
          version="${INPUT_VERSION#v}"
          if [ -z "${version}" ]; then
            version="$(sed -nE 's/^version=(.*)$/\1/p' gradle.properties)"
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::could not resolve an x.y.z version (got '${version}')"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${version}"

      - name: Assert the tag does not already exist
        if: ${{ inputs.mode != 'stage' }}
        shell: bash
        run: |
          set -eo pipefail
          tag="v${{ steps.resolve.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::${tag} already exists — this version has been released"
            exit 1
          fi
          echo "${tag} is free."

      - name: Assert module versions agree with CHANGELOG
        if: ${{ inputs.mode != 'stage' }}
        run: ./scripts/github-workflows/check_versions.sh "${{ steps.resolve.outputs.version }}"

      - name: Assert README pins this version
        if: ${{ inputs.mode != 'stage' }}
        shell: bash
        run: |
          set -eo pipefail
          version="${{ steps.resolve.outputs.version }}"
          if grep -nE "famesjranko[.:]musicmeta:?[a-z-]*:v?[0-9]+\.[0-9]+\.[0-9]+" README.md \
             | grep -vE ":v?${version}([^0-9]|$)"; then
            echo "::error::the coordinates above do not pin ${version} — re-run Prepare release"
            exit 1
          fi
          echo "README coordinates pin ${version}."

      - name: Assemble and check the release notes
        if: ${{ inputs.mode != 'stage' }}
        run: python3 scripts/github-workflows/build_release_notes.py "${{ steps.resolve.outputs.version }}"

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run tests and check public API
        # apiCheck is named explicitly: this job never runs `build`, so the release path would
        # otherwise publish an unchecked ABI.
        run: ./gradlew :musicmeta-core:test :musicmeta-okhttp:test :musicmeta-android:test apiCheck

      # A rehearsal publishes under <version>-rc.<run> with automaticRelease off, so it lands in the
      # portal as validated-but-unpublished, can be inspected, and is dropped by hand. The qualifier
      # sorts BELOW the real version in Maven ordering, so a staged artifact can never outrank a
      # release even if it were somehow published. Nothing in the repo changes.
      - name: Stage a droppable rehearsal on Maven Central
        if: ${{ inputs.mode == 'stage' }}
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
        run: |
          set -eo pipefail
          # Run attempt, not just run number: the number is stable across "Re-run failed jobs", so a
          # re-run after a successful upload would retry the same coordinate and Central would
          # reject the duplicate — and re-running is exactly what release.md tells you to do.
          staged="${VERSION}-rc.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          ORG_GRADLE_PROJECT_signingInMemoryKey="$(echo "$GPG_KEY_BASE64" | base64 -d)"
          if [ -z "$ORG_GRADLE_PROJECT_signingInMemoryKey" ]; then
            echo "::error::GPG_KEY_BASE64 decoded to an empty signing key — refusing to publish unsigned."
            exit 1
          fi
          export ORG_GRADLE_PROJECT_signingInMemoryKey
          ./gradlew publishAllPublicationsToMavenCentralRepository \
            -PautoRelease=false -Pversion="${staged}"
          echo "::notice::Staged ${staged}. Inspect it at https://central.sonatype.com/publishing/deployments then DROP it — it is a rehearsal, not a release."

      - name: Publish to Maven Central
        if: ${{ inputs.mode == 'release' }}
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
        run: |
          set -eo pipefail
          source ./scripts/github-workflows/central_poms.sh

          # Central rejects a re-upload of an existing version, so a re-run after a failed tag or a
          # timed-out poll must skip straight to the poll rather than fail on the duplicate.
          if all_poms_resolve "$VERSION"; then
            echo "${VERSION} is already on Maven Central — skipping upload."
            exit 0
          fi

          # Assign first, export second: `export VAR=$(cmd)` reports export's status, not the
          # command's, so a failed base64 decode would surface later as an opaque signing error.
          ORG_GRADLE_PROJECT_signingInMemoryKey="$(echo "$GPG_KEY_BASE64" | base64 -d)"
          if [ -z "$ORG_GRADLE_PROJECT_signingInMemoryKey" ]; then
            echo "::error::GPG_KEY_BASE64 decoded to an empty signing key — refusing to publish unsigned."
            exit 1
          fi
          export ORG_GRADLE_PROJECT_signingInMemoryKey
          ./gradlew publishAllPublicationsToMavenCentralRepository

      - name: Wait for all three modules to resolve on Maven Central
        if: ${{ inputs.mode == 'release' }}
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -eo pipefail
          source ./scripts/github-workflows/central_poms.sh
          # automaticRelease publishes without the portal click, but Central validates
          # asynchronously and Gradle goes green on upload — so resolvability is the only signal
          # that the release actually landed, and a partial publish is immutable.
          for _ in $(seq 1 60); do
            if all_poms_resolve "$VERSION"; then
              echo "All three modules resolve at ${VERSION}."
              exit 0
            fi
            sleep 30
          done
          echo "::error::${VERSION} did not resolve within 30 minutes. Check the deployment at"
          echo "::error::central.sonatype.com — it may have failed validation. Re-running this job"
          echo "::error::is safe: the upload is skipped once the artifacts are present."
          exit 1

  release:
    needs: [verify, publish]
    if: ${{ inputs.mode == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Tag the released commit
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -eo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "v${VERSION} already tagged — leaving it alone."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -eo pipefail
          python3 scripts/github-workflows/build_release_notes.py "$VERSION" --out notes.md
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release edit "v${VERSION}" --notes-file notes.md
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --notes-file notes.md --latest --verify-tag
          fi

      - name: Warm the JitPack build for this tag
        # JitPack is a pull, not a push: it clones and builds on first artifact request, from the
        # git tag alone. Nothing here publishes to it. Unwarmed, the first consumer to follow the
        # release note's JitPack link triggers a cold build and finds any failure for us.
        # Requesting the POM is what starts the build; the /api/builds endpoint only reports.
        continue-on-error: true
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -o pipefail
          base="https://jitpack.io/com/github/famesjranko/musicmeta"
          for module in musicmeta-core musicmeta-okhttp musicmeta-android; do
            code="$(curl -sS --max-time 600 -o /dev/null -w '%{http_code}' \
              "${base}/${module}/v${VERSION}/${module}-v${VERSION}.pom" || echo 000)"
            echo "${module}: HTTP ${code}"
          done
          # Non-gating by design — JitPack is a secondary channel and its build is not ours to fix
          # in the middle of a release. The status is here so a failure is visible in this run.
          curl -sS --max-time 60 "https://jitpack.io/api/builds/com.github.famesjranko/musicmeta/v${VERSION}" || true
