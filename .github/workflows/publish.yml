name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests and check public API
        # apiCheck compares the public ABI against the committed api/*.api baselines. This job does
        # not run `build`, so without naming apiCheck explicitly the tag path would publish an
        # unchecked API surface.
        #
        # This is the LAST line of defence, not the first: it fires after a tag exists, so a failure
        # here means deleting and re-pushing the tag. The first line of defence is a PR-time check
        # running `./gradlew build` (which carries apiCheck via `check`) — see the test-CI issue.
        run: ./gradlew :musicmeta-core:test :musicmeta-okhttp:test apiCheck

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(echo "$GPG_KEY_BASE64" | base64 -d)
          ./gradlew publishAllPublicationsToMavenCentralRepository
