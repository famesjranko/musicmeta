name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode GPG key
        env:
          GPG_KEY: ${{ secrets.GPG_KEY_BASE64 }}
        run: echo "$GPG_KEY" | base64 -d > /tmp/secring.gpg

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.keyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signing.password: ${{ secrets.GPG_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.secretKeyRingFile: /tmp/secring.gpg
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
