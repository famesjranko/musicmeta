name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify tag matches declared versions
        # Must stay ahead of the publish step: nothing here derives a version from the tag, so a
        # mismatch uploads the declared GAV and strands an immutable tag. Read from Gradle, not
        # grepped; an empty parse must fail or the guard is permanently green. bash for pipefail.
        shell: bash
        run: |
          set -eo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          failed=0
          for module in musicmeta-core musicmeta-android musicmeta-okhttp; do
            declared="$(./gradlew -q --console=plain ":${module}:properties" \
              | awk -F': ' '/^version: / {print $2; exit}')"
            if [ -z "${declared}" ]; then
              echo "::error::could not read a declared version from :${module}"
              failed=1
              continue
            fi
            if [ "${tag_version}" != "${declared}" ]; then
              echo "::error::tag ${GITHUB_REF_NAME} does not match :${module} version ${declared}"
              failed=1
            else
              echo ":${module} declares ${declared} — matches ${GITHUB_REF_NAME}."
            fi
          done
          [ "${failed}" -eq 0 ]

      - name: Run tests and check public API
        # apiCheck is named explicitly: this job never runs `build`, so the tag path would otherwise
        # publish an unchecked ABI. Last line of defence — a failure here costs a tag re-push, and
        # android's Robolectric tests fetch from Maven, so a CDN hiccup can trip it.
        run: ./gradlew :musicmeta-core:test :musicmeta-okhttp:test :musicmeta-android:test apiCheck

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
        run: |
          set -eo pipefail
          # Assign first, export second: `export VAR=$(cmd)` reports export's status, not the
          # command's, so a failed base64 decode would surface later as an opaque signing error.
          ORG_GRADLE_PROJECT_signingInMemoryKey="$(echo "$GPG_KEY_BASE64" | base64 -d)"
          if [ -z "$ORG_GRADLE_PROJECT_signingInMemoryKey" ]; then
            echo "::error::GPG_KEY_BASE64 decoded to an empty signing key — refusing to publish unsigned."
            exit 1
          fi
          export ORG_GRADLE_PROJECT_signingInMemoryKey
          ./gradlew publishAllPublicationsToMavenCentralRepository
