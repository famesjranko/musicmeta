name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests and check public API
        # apiCheck compares the public ABI against the committed api/*.api baselines. This job does
        # not run `build`, so without naming apiCheck explicitly the tag path would publish an
        # unchecked API surface.
        #
        # This is the LAST line of defence, not the first: it fires after a tag exists, so a failure
        # here means deleting and re-pushing the tag. The first line of defence is a PR-time check
        # running `./gradlew build` (which carries apiCheck via `check`) — see the test-CI issue.
        #
        # All three published modules are tested here. musicmeta-android was previously omitted,
        # which left the Room cache — persisted user data on device — untested on the only automated
        # path to Maven Central. This adds no toolchain requirement: :musicmeta-android is in
        # settings.gradle.kts so AGP configures on every invocation, and the unqualified apiCheck
        # already required the assembled variant.
        #
        # It does add a failure surface. Robolectric fetches its android-all jars from Maven at test
        # execution time, and AGP's unqualified `test` aggregates debug + release variants, so the
        # suite runs twice. A Maven or Robolectric CDN hiccup therefore fails this gate *after* the
        # tag exists — which per the note above means deleting and re-pushing the tag. Judged worth
        # it: publishing an untested Room migration is the worse outcome.
        run: ./gradlew :musicmeta-core:test :musicmeta-okhttp:test :musicmeta-android:test apiCheck

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}
        run: |
          set -eo pipefail
          # Assign first, export second. `export VAR=$(cmd)` reports export's own exit status, not
          # the command substitution's, so a failed or empty base64 decode would sail through and
          # surface later as an opaque signing error mid-publish. Split, the failure is caught here.
          ORG_GRADLE_PROJECT_signingInMemoryKey="$(echo "$GPG_KEY_BASE64" | base64 -d)"
          if [ -z "$ORG_GRADLE_PROJECT_signingInMemoryKey" ]; then
            echo "::error::GPG_KEY_BASE64 decoded to an empty signing key — refusing to publish unsigned."
            exit 1
          fi
          export ORG_GRADLE_PROJECT_signingInMemoryKey
          ./gradlew publishAllPublicationsToMavenCentralRepository
