name: Prepare release

# Gate 1 of the release flow — see docs/project/release.md. Writes the version everywhere it is
# consumed, then proves the notes assemble before committing.
#
# It pushes a `release/x.y.z` branch and stops. You open and squash-merge the PR yourself, because
# `main` is protected with no bypass actor and this workflow deliberately has none: the point of a
# single protected branch is that nothing writes to it directly, and carving out an exception for
# the release would reopen exactly the hole it closes.
#
# A PR opened by GITHUB_TOKEN would also create approval-required workflow runs, so bot-opening it
# saves a click and costs an approval — no gain.

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Version to release, e.g. 0.11.0. Choose it under the 0.x policy in CLAUDE.md.'
        required: true
      dry_run:
        description: 'Preview only — print the diff and the notes, push nothing.'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # SHA-pinned: this job pushes a branch. A tag is mutable.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main

      - name: Resolve versions
        id: versions
        shell: bash
        env:
          OVERRIDE: ${{ inputs.target_version }}
        run: |
          set -eo pipefail
          new="${OVERRIDE#v}"
          if ! [[ "${new}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::target_version '${OVERRIDE}' is not x.y.z"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${new}" >/dev/null 2>&1; then
            echo "::error::v${new} is already released"
            exit 1
          fi
          old="$(sed -nE 's/^version=(.*)$/\1/p' gradle.properties)"
          if [ -z "${old}" ]; then
            echo "::error::could not read version= from gradle.properties"
            exit 1
          fi
          echo "old=${old}" >> "$GITHUB_OUTPUT"
          echo "new=${new}" >> "$GITHUB_OUTPUT"
          echo "Preparing ${old} -> ${new}"

      - name: Pin the CHANGELOG section and the ROADMAP heading
        # One deterministic line each. Done by hand they are three chances to typo the value every
        # later check reads, and forgetting the fresh [Unreleased] silently appends the next
        # release's notes to this one.
        run: python3 scripts/github-workflows/pin_release.py "${{ steps.versions.outputs.new }}"

      - name: Write the version into gradle.properties and README
        shell: bash
        env:
          OLD: ${{ steps.versions.outputs.old }}
          NEW: ${{ steps.versions.outputs.new }}
        run: |
          set -eo pipefail
          sed -i -E "s/^version=.*/version=${NEW}/" gradle.properties
          # Both coordinate forms, unscoped: the 9 version-bearing lines sit in four places,
          # including one in prose outside any code block.
          sed -i -E "s/(io\.github\.famesjranko:musicmeta-[a-z]+):[0-9]+\.[0-9]+\.[0-9]+/\1:${NEW}/g" README.md
          sed -i -E "s/(com\.github\.famesjranko\.musicmeta:musicmeta-[a-z]+):v[0-9]+\.[0-9]+\.[0-9]+/\1:v${NEW}/g" README.md

          if [ "${OLD}" != "${NEW}" ] && grep -nE ":v?${OLD}([^0-9]|$)" README.md gradle.properties; then
            echo "::error::${OLD} still present above — a coordinate form was missed"
            exit 1
          fi
          grep -c "${NEW}" README.md

      - name: Assemble and check the release notes
        run: python3 scripts/github-workflows/build_release_notes.py "${{ steps.versions.outputs.new }}"

      - name: Show the diff
        run: git --no-pager diff

      - name: Commit and push the release branch
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          NEW: ${{ steps.versions.outputs.new }}
        run: |
          set -eo pipefail
          branch="release/${NEW}"
          # Refuse an existing branch rather than force-pushing over it: a stale release branch
          # usually means a previous attempt is still open, and clobbering it would discard the
          # only copy of whatever went wrong.
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            echo "::error::${branch} already exists on origin. Delete or finish it first."
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add gradle.properties README.md CHANGELOG.md ROADMAP.md
          git commit -m "release: prepare v${NEW}"
          # Non-force, explicit refspec — this creates the branch and can never move main.
          git push origin "HEAD:refs/heads/${branch}"

      - name: Next step
        shell: bash
        env:
          NEW: ${{ steps.versions.outputs.new }}
          DRY: ${{ inputs.dry_run }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${DRY}" = "true" ]; then
            echo "Dry run — nothing pushed. Re-run with dry_run unticked to commit v${NEW}."
          else
            echo "Pushed release/${NEW}. Next:"
            echo "  1. Open the PR:  ${SERVER}/${REPO}/compare/main...release/${NEW}?expand=1"
            echo "  2. Wait for build + demo-canary, then SQUASH-merge it."
            echo "  3. Note the squash commit SHA and stop merging anything else."
            echo "  4. Dispatch 'Release' from main, and confirm the run's commit is that SHA."
            echo "     workflow_dispatch pins to the branch tip at dispatch time, so a merge"
            echo "     landing in between would release the wrong tree."
            echo "  5. Once the run has started, merges can resume."
          fi
