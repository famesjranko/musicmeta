name: Release notes check

# Notes are written after the tag, so no PR gate sees them. Flags only — it cannot block, and does
# not fire on `gh release edit`; use workflow_dispatch to re-check. See docs/project/release.md.

on:
  release:
    types: [published, edited, released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to check (e.g. v0.10.1)'
        required: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate release notes pin the tag version
        # Body via env, never inlined into run: — a release body is untrusted, editable text.
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -eo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
            body="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq .body)"
          else
            tag="$RELEASE_TAG"
            body="$RELEASE_BODY"
          fi
          printf '%s' "$body" | python3 scripts/github-workflows/validate_release_notes.py "${tag#v}"
